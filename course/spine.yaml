# Starter spine — replace values and add either:
# - `chapters:` for a short course, or
# - `modules:` for a long course with 3+ meaningful module groupings.
# See course/spine-and-contents.md and course/spine.schema.json for the full contract.

course_id: your-course-slug
title: Your Course Title
audience_level: beginner

delivery:
  generation_mode: lesson_first
  default_batch_size: 1
  assessment_checkpoints: true
  assessment_format: short_answer
  prestructure_assessment: true
  prechapter_assessments: true

chapters:
  - dir: Ch1
    title: First chapter title
    summary: Optional narrow concept summary for this chapter.
    lessons:
      - id: L1
        title: "First lesson title"
        kind: lesson
        concept: "(Replace) one concise concept for this lesson."
        project_step: "(Replace) one project step this lesson advances."
        assignment:
          summary: "(Replace) the concrete thing the learner should build, change, explain, or review."
          outcomes:
            - "(Replace) one learner-visible outcome or acceptance point."
        reads: []
        tasks_summary: []
        depends_on: []
        hints: false
        # Optional when this lesson should include tests:
        # test_glob: main_test.py
        # lesson_selector: lesson_ch1_l1
