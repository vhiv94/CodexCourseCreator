name: repository-contract-checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install --upgrade pyyaml jsonschema

      - name: Validate schema + spine/CONTENTS + selector uniqueness
        run: python3 scripts/validate_repo.py

      - name: Check prior-lesson test regression safety
        if: github.event_name == 'pull_request'
        run: python3 scripts/check_test_regression.py --base-ref "${{ github.event.pull_request.base.sha }}"
